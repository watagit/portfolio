name: Visual Regression Testing

on:
  pull_request:
    types: [opened, synchronize, reopened]
  deployment_status:

jobs:
  visual-test:
    # Only run when Vercel deployment is successful
    if: github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success' && github.event.deployment_status.environment == 'Preview'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: nvm
        run: echo "nvmrc=$(cat .nvmrc)" >> $GITHUB_OUTPUT

      - uses: pnpm/action-setup@v2

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.nvm.outputs.nvmrc }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm playwright install chromium --with-deps

      - name: Run visual regression tests
        env:
          BASE_URL: ${{ github.event.deployment_status.target_url }}
        run: pnpm playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload screenshots to Argos
        continue-on-error: true
        run: |
          pnpm exec argos upload ./screenshots --token=${{ secrets.ARGOS_TOKEN }}
        if: always()
